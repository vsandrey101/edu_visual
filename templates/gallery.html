<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    #f_table {
      font-family: Arial, Helvetica, sans-serif;
      border-collapse: collapse;
      font-size: medium;
      width: 100%;
      font-weight: normal;
    }
    
    #f_table td, #f_table th {
      border: 1px solid #ddd;
      padding: 8px;
      white-space: pre-wrap;
    }
    
    #f_table tr:nth-child(even){background-color: #f2f2f2;}
    
    #f_table tr:hover {background-color: #ddd;}
    
    #f_table th {
      padding-top: 12px;
      padding-bottom: 12px;
      text-align: left;
      background-color: #405cf5;
      color: white;
    }
     .chart-preview {
    width: 640px;          /* фиксированная ширина "слота" */
    height: 480x;         /* фиксированная высота "слота" */
    overflow: hidden;      /* обрезать выходящее за рамки */
  }

  /* Сами картинки: одинаковый размер, вписываются в слот */
  .chart-preview img {
    width: 100%;
    height: 100%;
    object-fit: contain;   /* или cover, если нужно обрезать по краям */
    display: block;
  }
    </style> 
<title>Галерея</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style_editor.css') }}">

</head>
<body>
<center>
<h1>Примеры диаграмм</h1>



<div id="f_table" style="white-space: pre-wrap;">
    <table>
  <thead>
    <tr>
      <th>Название</th>
      <th>Внешний вид</th>
      <th>Требуемые данные</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>Столбчатая</td>
      <td>
        <div class="chart-preview"><img src="{{ url_for('static', filename='examples/bars.png') }}" alt="Пример столбчатой диаграммы"></div>
      </td>
      <td>Hash ФИО студента, Наименование работы, Результат</td>
    </tr>
    <tr>
      <td>Круговая диаграмма</td>
      <td>
        <div class="chart-preview"><img src="{{ url_for('static', filename='examples/circle.png') }}" alt="Круговая диаграмма"></div>
      </td>
      <td>Hash ФИО студента, Наименование работы, Результат (зачет/незачет)</td>
    </tr>
  </tbody>
</table>
</div>

</body>
</html>
